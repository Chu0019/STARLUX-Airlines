<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星宇航空動態航班看板</title>
    <link rel="stylesheet" href="styles.css?v=mobile-fit-1" />
  </head>
  <body>
    <main class="board" aria-label="星宇航空動態航班看板">
      <section class="summary" aria-label="航班摘要">
        <div>
          <span>TDX更新</span>
          <strong id="updatedAt">--:--</strong>
          <small id="tdxLastUpdatedAt">上次更新 --:--</small>
        </div>
        <div>
          <span>FR24更新</span>
          <strong id="fr24UpdatedAt">--:--</strong>
          <small id="fr24LastUpdatedAt">上次更新 --:--</small>
        </div>
        <div class="summary-action">
          <button id="forceRefreshButton" type="button">強制更新</button>
          <small id="forceRefreshStatus">重新抓 TDX / FR24</small>
        </div>
      </section>

      <section class="flight-panel" aria-label="星宇航空航班資訊">
        <div class="table-head" role="row">
          <span role="columnheader">ARR</span>
          <span role="columnheader">DEP</span>
          <span role="columnheader">TYPE</span>
          <span role="columnheader">IATA</span>
          <span role="columnheader">BAY</span>
          <span role="columnheader">STA</span>
          <span role="columnheader">STD</span>
          <span role="columnheader">倒數</span>
          <span role="columnheader">狀態</span>
        </div>
        <div id="flightRows" class="flight-rows" aria-live="polite"></div>
      </section>

    </main>

    <script src="script.js?v=force-refresh-4"></script>
  </body>
</html>
